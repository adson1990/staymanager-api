spring.datasource.url=jdbc:postgresql://localhost:5432/staymanager
spring.datasource.username=staymanager
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

security.jwt.secret=THIS_IS_A_DEMO_SECRET_CHANGE_ME_TO_32+_CHARS_1234567890_ABCDEFG
security.jwt.issuer=staymanager-api
security.jwt.access-token-ttl-minutes=15
security.jwt.refresh-token-ttl-days=7

